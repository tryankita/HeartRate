<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Rate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="offscreenCanvas" width="60" height="60"></canvas>
    
    <div id="uiContainer">
        <div id="progressCard" class="hidden">
            <div class="progress-text">
                <div class="progress-title">Measuring your heart rate.</div>
                <div class="progress-subtitle">Hold still...</div>
            </div>
            <div class="progress-circle-container">
                <svg class="progress-ring" width="50" height="50">
                    <circle class="progress-ring-circle bg" stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="transparent" r="22" cx="25" cy="25"/>
                    <circle id="progressRing" class="progress-ring-circle fg" stroke="#8ab4f8" stroke-width="4" fill="transparent" r="22" cx="25" cy="25"/>
                </svg>
                <div id="progressText">0%</div>
            </div>
        </div>

        <div id="measurementArea" class="hidden">
            <div id="pulseCircle"></div>
            <canvas id="waveformCanvas" width="300" height="100"></canvas>
            <div id="bpmValueDisplay">-- bpm</div>
        </div>
        
        <button id="startBtn">Start</button>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
